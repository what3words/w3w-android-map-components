name: Publish Release

on:
  push:
    branches:
      - 'staging'
  workflow_dispatch:    # Allow manual triggering

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      lib-changed: ${{ steps.changes.outputs.lib }}
      lib-compose-changed: ${{ steps.changes.outputs.lib-compose }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          # Get the last successful commit on the default branch
          git fetch origin main
          LAST_SUCCESSFUL_COMMIT=$(git rev-parse origin/main)

          # Compare changes between current commit and last successful commit
          if git diff --name-only HEAD $LAST_SUCCESSFUL_COMMIT | grep -q "^lib/"; then
            echo "lib=true" >> $GITHUB_OUTPUT
          else
            echo "lib=false" >> $GITHUB_OUTPUT
          fi

          if git diff --name-only HEAD $LAST_SUCCESSFUL_COMMIT | grep -q "^lib-compose/"; then
            echo "lib-compose=true" >> $GITHUB_OUTPUT
          else
            echo "lib-compose=false" >> $GITHUB_OUTPUT
          fi

  publish-lib:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.lib-changed == 'true'
    permissions:
      contents: write   # Required to create the GitHub release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Properties
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          W3W_GPG_SECRET_KEY: ${{ secrets.W3W_GPG_SECRET_KEY }}
          W3W_GPG_PASSPHRASE: ${{ secrets.W3W_GPG_PASSPHRASE }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          # Central Portal credentials (read by the vanniktech maven-publish plugin)
          echo "mavenCentralUsername=${MAVEN_CENTRAL_USERNAME}" >> ~/.gradle/gradle.properties
          echo "mavenCentralPassword=${MAVEN_CENTRAL_PASSWORD}" >> ~/.gradle/gradle.properties
          # In-memory GPG signing (the secret key is base64-encoded; vanniktech decodes it)
          echo "signingInMemoryKey=${W3W_GPG_SECRET_KEY}" >> ~/.gradle/gradle.properties
          echo "signingInMemoryKeyPassword=${W3W_GPG_PASSPHRASE}" >> ~/.gradle/gradle.properties
          echo "MAPBOX_DOWNLOADS_TOKEN=${MAPBOX_DOWNLOADS_TOKEN}" >> ~/.gradle/gradle.properties

      - name: Clean build
        run: ./gradlew clean

      - name: Publish to Maven Central
        run: ./gradlew :lib:publishToMavenCentral

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          IS_SNAPSHOT=$(grep '^IS_SNAPSHOT_RELEASE=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          VERSION=$(grep '^LIBRARY_VERSION=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          if [[ "$IS_SNAPSHOT" == "true" || "$VERSION" == *SNAPSHOT* ]]; then
            echo "Snapshot release ($VERSION); skipping GitHub release."
            exit 0
          fi
          TAG="v${VERSION}"
          # Overwrite any existing release/tag (matches the previous jReleaser overwrite behaviour)
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes

  publish-lib-compose:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.lib-compose-changed == 'true'
    permissions:
      contents: write   # Required to create the GitHub release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Properties
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          W3W_GPG_SECRET_KEY: ${{ secrets.W3W_GPG_SECRET_KEY }}
          W3W_GPG_PASSPHRASE: ${{ secrets.W3W_GPG_PASSPHRASE }}
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          # Central Portal credentials (read by the vanniktech maven-publish plugin)
          echo "mavenCentralUsername=${MAVEN_CENTRAL_USERNAME}" >> ~/.gradle/gradle.properties
          echo "mavenCentralPassword=${MAVEN_CENTRAL_PASSWORD}" >> ~/.gradle/gradle.properties
          # In-memory GPG signing (the secret key is base64-encoded; vanniktech decodes it)
          echo "signingInMemoryKey=${W3W_GPG_SECRET_KEY}" >> ~/.gradle/gradle.properties
          echo "signingInMemoryKeyPassword=${W3W_GPG_PASSPHRASE}" >> ~/.gradle/gradle.properties
          echo "MAPBOX_DOWNLOADS_TOKEN=${MAPBOX_DOWNLOADS_TOKEN}" >> ~/.gradle/gradle.properties

      - name: Clean build
        run: ./gradlew clean

      - name: Publish to Maven Central
        run: ./gradlew :lib-compose:publishToMavenCentral

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          IS_SNAPSHOT=$(grep '^IS_SNAPSHOT_RELEASE=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          VERSION=$(grep '^LIBRARY_COMPOSE_VERSION=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          if [[ "$IS_SNAPSHOT" == "true" || "$VERSION" == *SNAPSHOT* ]]; then
            echo "Snapshot release ($VERSION); skipping GitHub release."
            exit 0
          fi
          TAG="v${VERSION}"
          # Overwrite any existing release/tag (matches the previous jReleaser overwrite behaviour)
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
