name: Publish Release

on:
  push:
    branches:
      - 'main'   # Publishes an official release to Maven Central
  workflow_dispatch:    # Allow manual triggering

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      lib-changed: ${{ steps.changes.outputs.lib }}
      lib-compose-changed: ${{ steps.changes.outputs.lib-compose }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          # Diff the commits introduced by this push to main.
          BASE="${{ github.event.before }}"
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE=$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)
          fi

          if git diff --name-only HEAD "$BASE" | grep -q "^lib/"; then
            echo "lib=true" >> $GITHUB_OUTPUT
          else
            echo "lib=false" >> $GITHUB_OUTPUT
          fi

          if git diff --name-only HEAD "$BASE" | grep -q "^lib-compose/"; then
            echo "lib-compose=true" >> $GITHUB_OUTPUT
          else
            echo "lib-compose=false" >> $GITHUB_OUTPUT
          fi

  publish-lib:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.lib-changed == 'true'
    permissions:
      contents: write   # Required to create the GitHub release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Properties
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "MAPBOX_DOWNLOADS_TOKEN=${MAPBOX_DOWNLOADS_TOKEN}" >> ~/.gradle/gradle.properties

      - name: Check for SNAPSHOT dependencies
        run: ./gradlew :lib:checkSnapshotDependencies

      - name: Clean build
        run: ./gradlew clean

      - name: Publish to Maven Central
        run: ./gradlew :lib:publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(grep '^LIBRARY_VERSION=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          TAG="v${VERSION}"
          # Overwrite any existing release/tag (matches the previous jReleaser overwrite behaviour)
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --latest --generate-notes

  publish-lib-compose:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.lib-compose-changed == 'true'
    permissions:
      contents: write   # Required to create the GitHub release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Properties
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        shell: bash
        run: |
          mkdir -p ~/.gradle/
          echo "GRADLE_USER_HOME=${HOME}/.gradle" >> $GITHUB_ENV
          echo "MAPBOX_DOWNLOADS_TOKEN=${MAPBOX_DOWNLOADS_TOKEN}" >> ~/.gradle/gradle.properties

      - name: Check for SNAPSHOT dependencies
        run: ./gradlew :lib-compose:checkSnapshotDependencies

      - name: Clean build
        run: ./gradlew clean

      - name: Publish to Maven Central
        run: ./gradlew :lib-compose:publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(grep '^LIBRARY_COMPOSE_VERSION=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          TAG="v${VERSION}-compose"
          # Overwrite any existing release/tag (matches the previous jReleaser overwrite behaviour)
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --latest --generate-notes
